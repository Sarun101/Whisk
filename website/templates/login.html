<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisk - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
   <link
      href="{{ url_for('static', filename='css/login_styles.css') }}"
      rel="stylesheet"
    />
</head>
<body>

  <div class="d-flex justify-content-center align-items-center vh-100">
  <div class="p-4 p-md-5 auth-card">

    <!-- LOGIN FORM -->
    <form id="loginForm" method="post">
      <h4 class="mb-1 fw-semibold">Welcome back</h4>
      <p class="text-secondary mb-4 auth-subtitle">Log in to continue to Whisk</p>

      <div class="mb-3">
        <label for="loginRole" class="form-label small text-secondary">I am a</label>
        <select class="form-select auth-input" id="loginRole" name="role" required>
          <option value="customer">Customer</option>
          <option value="vendor">Vendor</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="loginEmail" class="form-label small text-secondary">Email</label>
        <input type="email" class="form-control auth-input" id="loginEmail" required>
      </div>

      <div class="mb-2">
        <label for="loginPassword" class="form-label small text-secondary">Password</label>
        <input type="password" class="form-control auth-input" id="loginPassword" required>
      </div>

      <div class="text-end mb-4">
        <a href="#" id="showSignup" class="small auth-link">New here? Create an account</a>
      </div>

      <button type="submit" class="btn w-100 auth-btn">Login</button>
    </form>

    <!-- SIGNUP FORM -->
    <form id="signupForm" class="d-none" method="post">
      <h4 class="mb-1 fw-semibold">Create account</h4>
      <p class="text-secondary mb-4 auth-subtitle">Join Whisk today</p>

      <div class="mb-3">
        <label for="signupRole" class="form-label small text-secondary">I am a</label>
        <select class="form-select auth-input" id="signupRole" name="role" required>
          <option value="customer">Customer</option>
          <option value="vendor">Vendor</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="signupEmail" class="form-label small text-secondary">Email</label>
        <input type="email" class="form-control auth-input" id="signupEmail" required>
      </div>

      <div class="mb-3">
        <label for="signupUsername" class="form-label small text-secondary">Username</label>
        <input type="text" class="form-control auth-input" id="signupUsername" required>
      </div>

      <div class="mb-3">
        <label for="signupPassword" class="form-label small text-secondary">Password</label>
        <input type="password" class="form-control auth-input" id="signupPassword" required>
      </div>

      <div class="mb-2">
        <label for="signupPasswordConfirm" class="form-label small text-secondary">Confirm password</label>
        <input type="password" class="form-control auth-input" id="signupPasswordConfirm" required>
      </div>

      <div class="text-end mb-4">
        <a href="#" id="showLogin" class="small auth-link">Already have an account? Login</a>
      </div>

      <button type="submit" class="btn w-100 auth-btn">Sign up</button>
    </form>

  </div>
</div>

<script>
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  document.getElementById('showSignup').addEventListener('click', (e) => {
    e.preventDefault();
    loginForm.classList.add('d-none');
    signupForm.classList.remove('d-none');
  });

  document.getElementById('showLogin').addEventListener('click', (e) => {
    e.preventDefault();
    signupForm.classList.add('d-none');
    loginForm.classList.remove('d-none');
  });
</script>

</body>
</html>
