<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whisk - Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="{{ url_for('static', filename='css/login_styles.css') }}"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="d-flex justify-content-center align-items-center vh-100">
      <div class="p-4 p-md-5 auth-card">
        <!-- LOGIN FORM -->
        <form id="loginForm" method="post">
          <h4 class="mb-1 fw-semibold">Welcome back</h4>
          <p class="text-secondary mb-4 auth-subtitle">
            Log in to continue to Whisk
          </p>

          <div class="mb-3">
            <label for="loginRole" class="form-label small text-secondary"
              >I am a</label
            >
            <select
              class="form-select auth-input"
              id="loginRole"
              name="role"
              required
            >
              <option value="customer">Customer</option>
              <option value="vendor">Vendor</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="loginEmail" class="form-label small text-secondary"
              >Email</label
            >
            <input
              type="email"
              class="form-control auth-input"
              id="loginEmail"
              required
              name="email"
            />
          </div>

          <div class="mb-2">
            <label for="loginPassword" class="form-label small text-secondary"
              >Password</label
            >
            <input
              type="password"
              class="form-control auth-input"
              id="loginPassword"
              required
              name="password"
            />
          </div>

          <div class="text-end mb-4">
            <a
              href="{{ url_for('auth.sign_up') }}"
              id="showSignup"
              class="small auth-link"
              >New here? Create an account</a
            >
          </div>

          <button type="submit" class="btn w-100 auth-btn">Login</button>
        </form>

      </div>
    </div>
  </body>
</html>
